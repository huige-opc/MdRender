<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="gpurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8699FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gorange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ED8936;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F6AD55;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ggreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48BB78;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#68D391;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#667EEA"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ED8936"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1A365D"/>
    </marker>
  </defs>
  <rect width="700" height="480" rx="14" fill="#F8F6F3"/>

  <text x="350" y="38" text-anchor="middle" fill="#2D3748" font-size="18" font-weight="bold">🤖 AI + CLI 完美闭环</text>
  <text x="350" y="60" text-anchor="middle" fill="#718096" font-size="13">AI 不用处理复杂 API 鉴权，直接复用封装好的 CLI，省钱又稳定</text>

  <!-- 外圈虚线 -->
  <ellipse cx="350" cy="260" rx="270" ry="160" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- ========== 左侧：人类 ========== -->
  <rect x="30" y="120" width="160" height="90" rx="14" fill="url(#gorange)" filter="url(#shadow)"/>
  <text x="110" y="152" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">👤 你</text>
  <text x="110" y="174" text-anchor="middle" fill="#FFF5EB" font-size="12">用自然语言提需求</text>

  <rect x="45" y="224" width="130" height="46" rx="8" fill="#fff" stroke="#ED8936" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="246" text-anchor="middle" fill="#C05621" font-size="11">帮我查今天日程，</text>
  <text x="110" y="262" text-anchor="middle" fill="#C05621" font-size="11">整理成可读清单</text>

  <!-- 箭头 人类→AI -->
  <line x1="190" y1="165" x2="248" y2="165" stroke="#667EEA" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <rect x="198" y="144" width="40" height="20" rx="10" fill="#E9D8FD" filter="url(#shadow)"/>
  <text x="218" y="158" text-anchor="middle" fill="#805AD5" font-size="10">提示词</text>

  <!-- ========== 中上：AI 大脑 ========== -->
  <rect x="255" y="82" width="190" height="90" rx="14" fill="url(#gpurple)" filter="url(#shadow)"/>
  <text x="350" y="115" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🧠 AI 大模型</text>
  <text x="350" y="137" text-anchor="middle" fill="#E9D8FD" font-size="12">完美识别单行命令</text>
  <text x="350" y="156" text-anchor="middle" fill="#E9D8FD" font-size="11">零学习成本适配 CLI</text>

  <!-- 箭头 AI→CLI -->
  <line x1="350" y1="172" x2="350" y2="248" stroke="#48BB78" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="300" y="193" width="100" height="20" rx="10" fill="#C6F6D5" filter="url(#shadow)"/>
  <text x="350" y="207" text-anchor="middle" fill="#276749" font-size="10">CLI 指令</text>

  <!-- ========== 右侧：CLI 终端 ========== -->
  <rect x="490" y="82" width="180" height="200" rx="14" fill="#fff" stroke="#48BB78" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="505" y="82" width="150" height="32" rx="14" fill="#EBF8FF" stroke="#667EEA" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="518" cy="98" r="5" fill="#FC8181"/>
  <circle cx="533" cy="98" r="5" fill="#F6E05E"/>
  <circle cx="548" cy="98" r="5" fill="#1A365D"/>
  <text x="655" y="102" text-anchor="end" fill="#A0AEC0" font-size="10">terminal</text>

  <text x="580" y="130" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">💻 飞书 CLI</text>
  <text x="580" y="150" text-anchor="middle" fill="#718096" font-size="11">封装了所有 API 细节</text>

  <rect x="505" y="165" width="155" height="34" rx="6" fill="#EBF8FF" stroke="#667EEA" stroke-width="1" filter="url(#shadow)"/>
  <text x="582" y="188" text-anchor="middle" fill="#1A365D" font-size="12" font-family="'Courier New',monospace">$ lark calendar</text>

  <rect x="505" y="205" width="155" height="34" rx="6" fill="#EBF8FF" stroke="#667EEA" stroke-width="1" filter="url(#shadow)"/>
  <text x="582" y="228" text-anchor="middle" fill="#1A365D" font-size="12" font-family="'Courier New',monospace">$ lark meeting</text>

  <rect x="505" y="245" width="155" height="34" rx="6" fill="#EBF8FF" stroke="#667EEA" stroke-width="1" filter="url(#shadow)"/>
  <text x="582" y="268" text-anchor="middle" fill="#1A365D" font-size="12" font-family="'Courier New',monospace">$ lark message</text>

  <!-- ========== 底部：返回结果 ========== -->
  <line x1="350" y1="282" x2="350" y2="342" stroke="#48BB78" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="344,340 350,350 356,340" fill="#1A365D"/>

  <rect x="200" y="356" width="300" height="50" rx="12" fill="url(#ggreen)" filter="url(#shadow)"/>
  <text x="350" y="380" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">✅ 返回可读结果，你直接使用</text>
  <text x="350" y="398" text-anchor="middle" fill="#E6FFFA" font-size="11">AI 不用处理 API 鉴权、报错、JSON 解析</text>

  <!-- 循环箭头（左侧） -->
  <path d="M 60 280 Q 30 340 80 400 Q 150 440 280 400 Q 330 380 350 342"
        fill="none" stroke="#667EEA" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>
  <rect x="30" y="390" width="70" height="22" rx="11" fill="#E9D8FD" filter="url(#shadow)"/>
  <text x="65" y="405" text-anchor="middle" fill="#805AD5" font-size="10">继续对话</text>

  <!-- ========== 核心优势 ========== -->
  <rect x="30" y="420" width="200" height="44" rx="10" fill="#FFF5EB" filter="url(#shadow)"/>
  <text x="130" y="442" text-anchor="middle" fill="#C05621" font-size="12" font-weight="bold">💰 省算力</text>
  <text x="130" y="458" text-anchor="middle" fill="#ED8936" font-size="10">无需处理鉴权和报错</text>

  <rect x="250" y="420" width="200" height="44" rx="10" fill="#E9D8FD" filter="url(#shadow)"/>
  <text x="350" y="442" text-anchor="middle" fill="#805AD5" font-size="12" font-weight="bold">⚡ 省时间</text>
  <text x="350" y="458" text-anchor="middle" fill="#667EEA" font-size="10">小白也能自动化办公</text>

  <rect x="470" y="420" width="200" height="44" rx="10" fill="#C6F6D5" filter="url(#shadow)"/>
  <text x="570" y="442" text-anchor="middle" fill="#276749" font-size="12" font-weight="bold">🛡️ 更稳定</text>
  <text x="570" y="458" text-anchor="middle" fill="#1A365D" font-size="10">复用成熟封装不踩坑</text>
</svg>
