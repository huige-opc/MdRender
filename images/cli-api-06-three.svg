<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="gblue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8DEF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7CAAFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gorange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ED8936;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F6AD55;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gpurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667EEA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8699FF;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="760" height="360" rx="14" fill="#F8F6F3"/>

  <text x="380" y="32" text-anchor="middle" fill="#2D3748" font-size="18" font-weight="bold">🔀 三种人机交互，各司其职，互不替代</text>

  <!-- ========== GUI ========== -->
  <rect x="20" y="55" width="230" height="280" rx="14" fill="#fff" stroke="#5B8DEF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="55" width="230" height="44" rx="14" fill="url(#gblue)" filter="url(#shadow)"/>
  <text x="135" y="82" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🖱️ GUI 图形界面</text>

  <!-- 桌面图标 -->
  <rect x="40" y="115" width="50" height="50" rx="8" fill="#FC8181"/>
  <text x="65" y="145" text-anchor="middle" fill="#fff" font-size="20">📄</text>
  <text x="65" y="172" text-anchor="middle" fill="#4A5568" font-size="9">文档</text>

  <rect x="100" y="115" width="50" height="50" rx="8" fill="#F6E05E"/>
  <text x="125" y="145" text-anchor="middle" fill="#fff" font-size="20">📊</text>
  <text x="125" y="172" text-anchor="middle" fill="#4A5568" font-size="9">表格</text>

  <rect x="160" y="115" width="50" height="50" rx="8" fill="#1A365D"/>
  <text x="185" y="145" text-anchor="middle" fill="#fff" font-size="20">🖼️</text>
  <text x="185" y="172" text-anchor="middle" fill="#4A5568" font-size="9">图片</text>

  <!-- 鼠标 -->
  <ellipse cx="135" cy="210" rx="15" ry="20" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="1.5"/>
  <line x1="135" y1="200" x2="135" y2="220" stroke="#A0AEC0" stroke-width="2"/>

  <text x="135" y="244" text-anchor="middle" fill="#2B6CB0" font-size="13" font-weight="bold">鼠标点点即可</text>
  <text x="135" y="262" text-anchor="middle" fill="#4A5568" font-size="11">直观、所见即所得</text>
  <text x="135" y="278" text-anchor="middle" fill="#4A5568" font-size="11">不需要任何学习</text>

  <rect x="40" y="295" width="190" height="30" rx="15" fill="#BEE3F8" filter="url(#shadow)"/>
  <text x="135" y="315" text-anchor="middle" fill="#2B6CB0" font-size="11" font-weight="bold">✅ 普通人日常办公首选</text>

  <!-- 箭头 1→2 -->
  <line x1="250" y1="195" x2="285" y2="195" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="280,190 290,195 280,200" fill="#CBD5E0"/>

  <!-- ========== CLI ========== -->
  <rect x="295" y="55" width="230" height="280" rx="14" fill="#fff" stroke="#ED8936" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="295" y="55" width="230" height="44" rx="14" fill="url(#gorange)" filter="url(#shadow)"/>
  <text x="410" y="82" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">💻 CLI 命令行</text>

  <!-- 终端窗口 -->
  <rect x="310" y="110" width="200" height="130" rx="8" fill="#EBF8FF" stroke="#5B8DEF" stroke-width="1" filter="url(#shadow)"/>
  <rect x="310" y="110" width="200" height="26" rx="8" fill="#2D3748"/>
  <circle cx="322" cy="123" r="4" fill="#FC8181"/>
  <circle cx="334" cy="123" r="4" fill="#F6E05E"/>
  <circle cx="346" cy="123" r="4" fill="#1A365D"/>
  <text x="420" y="127" text-anchor="end" fill="#A0AEC0" font-size="10">bash</text>

  <text x="410" y="156" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">$ lark calendar</text>
  <text x="410" y="178" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">$ lark meeting</text>
  <text x="410" y="200" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">$ lark message</text>
  <text x="410" y="230" text-anchor="middle" fill="#7CAAFF" font-size="11" font-weight="bold">▋</text>

  <!-- 键盘 -->
  <rect x="350" y="258" width="120" height="30" rx="6" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="1"/>
  <text x="410" y="278" text-anchor="middle" fill="#4A5568" font-size="10">A S D F G H ...</text>

  <text x="410" y="308" text-anchor="middle" fill="#C05621" font-size="13" font-weight="bold">文字指令，精准控制</text>
  <text x="410" y="326" text-anchor="middle" fill="#4A5568" font-size="11">适配人工 + 轻量化 AI</text>

  <rect x="310" y="300" width="200" height="30" rx="15" fill="#FFF5EB" filter="url(#shadow)"/>
  <text x="410" y="320" text-anchor="middle" fill="#C05621" font-size="11" font-weight="bold">✅ 人工操作 + AI 辅助首选</text>

  <!-- 箭头 2→3 -->
  <line x1="525" y1="195" x2="560" y2="195" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="555,190 565,195 555,200" fill="#CBD5E0"/>

  <!-- ========== API ========== -->
  <rect x="570" y="55" width="170" height="280" rx="14" fill="#fff" stroke="#667EEA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="570" y="55" width="170" height="44" rx="14" fill="url(#gpurple)" filter="url(#shadow)"/>
  <text x="655" y="82" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🔗 API 接口</text>

  <!-- 服务器 -->
  <rect x="585" y="115" width="65" height="90" rx="6" fill="#EBF8FF" stroke="#667EEA" stroke-width="1" filter="url(#shadow)"/>
  <rect x="592" y="125" width="50" height="6" rx="3" fill="#1A365D"/>
  <rect x="592" y="136" width="50" height="6" rx="3" fill="#1A365D"/>
  <rect x="592" y="147" width="50" height="6" rx="3" fill="#1A365D"/>
  <text x="617" y="185" text-anchor="middle" fill="#667EEA" font-size="10">Server A</text>

  <!-- 数据流 -->
  <line x1="650" y1="140" x2="680" y2="140" stroke="#7CAAFF" stroke-width="2.5"/>
  <line x1="650" y1="160" x2="680" y2="160" stroke="#7CAAFF" stroke-width="2.5"/>
  <line x1="650" y1="180" x2="680" y2="180" stroke="#7CAAFF" stroke-width="2.5"/>

  <!-- 服务器 B -->
  <rect x="680" y="115" width="55" height="90" rx="6" fill="#EBF8FF" stroke="#667EEA" stroke-width="1" filter="url(#shadow)"/>
  <rect x="687" y="125" width="40" height="6" rx="3" fill="#7CAAFF"/>
  <rect x="687" y="136" width="40" height="6" rx="3" fill="#7CAAFF"/>
  <rect x="687" y="147" width="40" height="6" rx="3" fill="#7CAAFF"/>
  <text x="707" y="185" text-anchor="middle" fill="#667EEA" font-size="10">Server B</text>

  <text x="655" y="240" text-anchor="middle" fill="#805AD5" font-size="13" font-weight="bold">程序对话程序</text>
  <text x="655" y="258" text-anchor="middle" fill="#4A5568" font-size="11">全程自动，无人值守</text>
  <text x="655" y="276" text-anchor="middle" fill="#4A5568" font-size="11">7×24 小时运行</text>
  <text x="655" y="294" text-anchor="middle" fill="#4A5568" font-size="11">结果只给机器读</text>

  <rect x="580" y="305" width="160" height="30" rx="15" fill="#E9D8FD" filter="url(#shadow)"/>
  <text x="660" y="325" text-anchor="middle" fill="#805AD5" font-size="11" font-weight="bold">✅ AI 自动化地基</text>
</svg>
