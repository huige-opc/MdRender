<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="gblue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8DEF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7CAAFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ggreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48BB78;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#68D391;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gorange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ED8936;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F6AD55;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="720" height="520" rx="14" fill="#F8F6F3"/>

  <text x="360" y="38" text-anchor="middle" fill="#2D3748" font-size="18" font-weight="bold">🛠️ 飞书 CLI 三步实操</text>
  <text x="360" y="60" text-anchor="middle" fill="#718096" font-size="13">安装 → 授权 → 使用，全程不需要写代码</text>

  <!-- ========== 步骤 1 ========== -->
  <rect x="30" y="82" width="200" height="200" rx="14" fill="#fff" stroke="#5B8DEF" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="60" cy="110" r="20" fill="url(#gblue)" filter="url(#shadow)"/>
  <text x="60" y="117" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">1</text>
  <text x="130" y="112" text-anchor="middle" fill="#2B6CB0" font-size="14" font-weight="bold">安装工具</text>
  <text x="130" y="130" text-anchor="middle" fill="#718096" font-size="11">仅需一次</text>

  <rect x="45" y="148" width="170" height="40" rx="8" fill="#EBF4FF" stroke="#5B8DEF" stroke-width="1"/>
  <text x="130" y="174" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">npm install -g</text>
  <text x="130" y="192" text-anchor="middle" fill="#2B6CB0" font-size="12" font-family="'Courier New',monospace">@larksuite/cli</text>

  <text x="130" y="268" text-anchor="middle" fill="#4A5568" font-size="11">✅ Node.js 自带 npm</text>

  <!-- 箭头 1→2 -->
  <line x1="230" y1="182" x2="270" y2="182" stroke="#5B8DEF" stroke-width="2.5"/>
  <polygon points="265,177 275,182 265,187" fill="#5B8DEF"/>

  <!-- ========== 步骤 2 ========== -->
  <rect x="280" y="82" width="200" height="200" rx="14" fill="#fff" stroke="#48BB78" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="310" cy="110" r="20" fill="url(#ggreen)" filter="url(#shadow)"/>
  <text x="310" y="117" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">2</text>
  <text x="380" y="112" text-anchor="middle" fill="#276749" font-size="14" font-weight="bold">账号授权</text>
  <text x="380" y="130" text-anchor="middle" fill="#718096" font-size="11">扫码绑定飞书</text>

  <rect x="295" y="148" width="170" height="40" rx="8" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="380" y="174" text-anchor="middle" fill="#1A365D" font-size="15" font-family="'Courier New',monospace">lark login</text>

  <!-- 手机扫码图标 -->
  <rect x="330" y="200" width="60" height="80" rx="6" fill="#E2E8F0" stroke="#48BB78" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="340" y="210" width="40" height="50" rx="3" fill="#fff"/>
  <rect x="346" y="216" width="28" height="4" rx="2" fill="#1A365D"/>
  <rect x="346" y="224" width="20" height="4" rx="2" fill="#CBD5E0"/>
  <rect x="346" y="232" width="24" height="4" rx="2" fill="#CBD5E0"/>
  <rect x="346" y="240" width="16" height="4" rx="2" fill="#CBD5E0"/>
  <circle cx="360" cy="288" r="6" fill="#1A365D"/>
  <text x="380" y="286" text-anchor="middle" fill="#1A365D" font-size="10">扫码</text>

  <!-- 箭头 2→3 -->
  <line x1="480" y1="182" x2="520" y2="182" stroke="#48BB78" stroke-width="2.5"/>
  <polygon points="515,177 525,182 515,187" fill="#1A365D"/>

  <!-- ========== 步骤 3 ========== -->
  <rect x="530" y="82" width="160" height="200" rx="14" fill="#fff" stroke="#ED8936" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="560" cy="110" r="20" fill="url(#gorange)" filter="url(#shadow)"/>
  <text x="560" y="117" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">3</text>
  <text x="610" y="112" text-anchor="middle" fill="#C05621" font-size="14" font-weight="bold">开始使用</text>
  <text x="610" y="130" text-anchor="middle" fill="#718096" font-size="11">直接输命令即可</text>

  <rect x="545" y="148" width="130" height="30" rx="6" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="610" y="168" text-anchor="middle" fill="#1A365D" font-size="11" font-family="'Courier New',monospace">lark calendar</text>

  <rect x="545" y="185" width="130" height="30" rx="6" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="610" y="205" text-anchor="middle" fill="#1A365D" font-size="11" font-family="'Courier New',monospace">lark message</text>

  <rect x="545" y="222" width="130" height="30" rx="6" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="610" y="242" text-anchor="middle" fill="#1A365D" font-size="11" font-family="'Courier New',monospace">lark meeting</text>

  <!-- ========== 底部实用命令 ========== -->
  <text x="360" y="300" text-anchor="middle" fill="#2D3748" font-size="14" font-weight="bold">📋 常用命令直接复制用</text>

  <rect x="30" y="318" width="660" height="52" rx="10" fill="#fff" stroke="#5B8DEF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="340" text-anchor="start" fill="#2B6CB0" font-size="12" font-weight="bold">查日程：</text>
  <rect x="120" y="326" width="340" height="36" rx="6" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="290" y="350" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">lark calendar list today</text>

  <rect x="480" y="326" width="195" height="36" rx="6" fill="#EBF4FF" filter="url(#shadow)"/>
  <text x="578" y="350" text-anchor="middle" fill="#2B6CB0" font-size="11">查看今日所有日程</text>

  <rect x="30" y="382" width="660" height="52" rx="10" fill="#fff" stroke="#48BB78" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="404" text-anchor="start" fill="#276749" font-size="12" font-weight="bold">发通知：</text>
  <rect x="120" y="390" width="370" height="36" rx="6" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="305" y="414" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">lark message send --chat 群ID --text "加班通知"</text>

  <rect x="510" y="390" width="165" height="36" rx="6" fill="#E6FFFA" filter="url(#shadow)"/>
  <text x="593" y="414" text-anchor="middle" fill="#276749" font-size="11">项目群发工作通知</text>

  <rect x="30" y="446" width="660" height="52" rx="10" fill="#fff" stroke="#ED8936" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="468" text-anchor="start" fill="#C05621" font-size="12" font-weight="bold">创会议：</text>
  <rect x="120" y="454" width="360" height="36" rx="6" fill="#EBF8FF" filter="url(#shadow)"/>
  <text x="300" y="478" text-anchor="middle" fill="#1A365D" font-size="13" font-family="'Courier New',monospace">lark meeting create --title "周例会" --notify true</text>

  <rect x="500" y="454" width="175" height="36" rx="6" fill="#FFF5EB" filter="url(#shadow)"/>
  <text x="588" y="478" text-anchor="middle" fill="#C05621" font-size="11">一键创建+自动通知</text>
</svg>
